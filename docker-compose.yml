services:
  auth-db:
    image: postgres:16
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: auth
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth"]
      interval: 5s
      timeout: 5s
      retries: 5

  chat-db:
    image: postgres:16
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
      POSTGRES_DB: chat
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10
    command: ["-js"]
    ports:
      - "4222:4222"

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    environment:
      GRPC_PORT: "50051"
      POSTGRES_DSN: postgres://auth:auth@auth-db:5432/auth?sslmode=disable
      REDIS_ADDR: redis:6379
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started

  chat-service:
    build:
      context: .
      dockerfile: services/chat-service/Dockerfile
    environment:
      GRPC_PORT: "50051"
      POSTGRES_DSN: postgres://chat:chat@chat-db:5432/chat?sslmode=disable
      REDIS_ADDR: redis:6379
      NATS_URL: nats://nats:4222
      AUTH_SERVICE_ADDR: auth-service:50051
    depends_on:
      chat-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
      auth-service:
        condition: service_healthy

  ws-gateway:
    build:
      context: .
      dockerfile: services/ws-gateway/Dockerfile
    environment:
      GRPC_PORT: "50051"
      NATS_URL: nats://nats:4222
      CHAT_SERVICE_ADDR: chat-service:50051
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
    depends_on:
      nats:
        condition: service_started
      chat-service:
        condition: service_healthy

  notification-worker:
    build:
      context: .
      dockerfile: services/notification-worker/Dockerfile
    environment:
      GRPC_PORT: "50051"
      NATS_URL: nats://nats:4222
    depends_on:
      nats:
        condition: service_started
