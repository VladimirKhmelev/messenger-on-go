name: CI

on:
  push:
  pull_request:

env:
  GO_VERSION: "1.26.2"

jobs:
  proto-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install protolint
        run: go install github.com/yoheimuta/protolint/cmd/protolint@v0.53.0
      - name: Run protolint
        run: protolint lint proto/auth/v1/auth.proto proto/chat/v1/chat.proto

  auth-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/auth-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go build ./...

  chat-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/chat-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go build ./...

  ws-gateway:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ws-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go build ./...

  notification-worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/notification-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go build ./...
